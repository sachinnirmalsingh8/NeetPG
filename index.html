<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEET PG">
<meta name="theme-color" content="#1B4332">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>NEET PG Study Tracker</title>
<style>
:root{--bg:#F4F0EA;--card:#FFFFFF;--card-border:rgba(0,0,0,0.05);--text:#110F0D;--text-secondary:#7A7167;--accent:#1B4332;--accent-mid:#2D6A4F;--accent-light:#D8F3DC;--accent-glow:#40916C;--warm:#D4A373;--warm-deep:#BC6C25;--warm-light:#FEFAE0;--red:#BC4749;--red-light:#FBE5E5;--purple:#6C567B;--blue:#3A6EA5;--font-display:'Georgia','Times New Roman',serif;--font-body:-apple-system,'Segoe UI','Helvetica Neue',sans-serif;--radius:16px;--radius-sm:10px;--shadow-sm:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.06);--shadow:0 4px 16px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04)}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;-webkit-font-smoothing:antialiased}

.app-header{background:linear-gradient(145deg,#0D2818 0%,var(--accent) 40%,var(--accent-mid) 100%);color:white;padding:24px 20px 22px;padding-top:calc(24px + env(safe-area-inset-top));position:relative;overflow:hidden}
.app-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--warm),var(--accent-glow),var(--warm))}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.app-title{font-family:var(--font-display);font-size:1.55rem;letter-spacing:-0.5px;font-weight:400}
.app-title span{color:var(--warm);font-weight:700}
.header-date{font-size:0.68rem;opacity:0.6;letter-spacing:1px;text-transform:uppercase}
.header-subtitle{font-size:0.85rem;opacity:0.85;font-weight:300}
.header-row2{display:flex;gap:8px;margin-top:10px;align-items:center}
.notif-toggle{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);color:white;padding:5px 12px;border-radius:20px;font-size:0.68rem;cursor:pointer;font-family:var(--font-body);font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px}
.notif-toggle .notif-dot{width:6px;height:6px;border-radius:50%;background:#EF4444;animation:pulse-dot 2s infinite}
.notif-toggle .notif-dot.on{background:#34D399;animation:none}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}
.version-tag{font-size:0.6rem;opacity:0.35;letter-spacing:0.5px}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;margin-top:-14px}
.stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:12px 6px;text-align:center;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2.5px}
.stat-card:nth-child(1)::after{background:var(--accent)}
.stat-card:nth-child(2)::after{background:var(--warm)}
.stat-card:nth-child(3)::after{background:var(--purple)}
.stat-card:nth-child(4)::after{background:var(--blue)}
.stat-value{font-family:var(--font-display);font-size:1.4rem;color:var(--text);line-height:1.1}
.stat-label{font-size:0.58rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.8px;margin-top:3px;font-weight:500}

.nav-tabs{display:flex;padding:0 16px;border-bottom:1px solid var(--card-border);background:rgba(244,240,234,0.9);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav-tab{flex:1;padding:13px 4px;text-align:center;font-size:0.7rem;font-weight:600;color:var(--text-secondary);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;text-transform:uppercase}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab-content{display:none;padding:16px}
.tab-content.active{display:block;animation:fadeUp 0.25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* TODAY */
.today-hero{background:linear-gradient(145deg,#0D2818,var(--accent),var(--accent-mid));border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);color:white;position:relative;overflow:hidden}
.today-hero::before{content:'';position:absolute;top:-40%;right:-20%;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.03)}
.today-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:1.5px;opacity:0.6;margin-bottom:4px}
.today-subject-name{font-family:var(--font-display);font-size:1.7rem;font-weight:400;letter-spacing:-0.5px}
.today-day-badge{display:inline-block;background:rgba(255,255,255,0.12);color:white;font-size:0.68rem;font-weight:500;padding:3px 10px;border-radius:20px;margin-top:6px}

.current-block-banner{background:var(--warm-light);border:1.5px solid var(--warm);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:0.8rem;font-weight:500;color:var(--warm-deep)}
.current-block-banner .live-dot{width:7px;height:7px;border-radius:50%;background:var(--warm-deep);animation:pulse-dot 1.5s infinite;flex-shrink:0}

/* TIMER */
.timer-wrap{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.timer-presets{display:flex;gap:6px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.timer-preset{padding:5px 14px;border-radius:20px;border:1.5px solid var(--card-border);background:white;font-size:0.72rem;font-weight:600;cursor:pointer;color:var(--text-secondary);transition:all 0.15s;font-family:var(--font-body)}
.timer-preset.active{background:var(--accent);color:white;border-color:var(--accent)}
.timer-ring{width:170px;height:170px;margin:0 auto 10px;position:relative}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-linecap:round}
.timer-ring .ring-bg{stroke:rgba(0,0,0,0.04);stroke-width:8}
.timer-ring .ring-fg{stroke:var(--accent);stroke-width:8;transition:stroke-dashoffset 0.5s linear}
.timer-ring .ring-fg.urgent{stroke:var(--red)}
.timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-display{font-family:var(--font-display);font-size:2.8rem;color:var(--text);letter-spacing:1px;line-height:1}
.timer-sub{font-size:0.65rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1.2px;margin-top:3px}
.timer-btns{display:flex;gap:8px;justify-content:center}
.btn-timer{padding:9px 26px;border:2px solid var(--accent);border-radius:var(--radius-sm);background:white;color:var(--accent);font-weight:600;font-size:0.78rem;cursor:pointer;transition:all 0.15s;font-family:var(--font-body);letter-spacing:0.3px}
.btn-timer.active-timer{background:var(--accent);color:white}
.btn-timer:active{transform:scale(0.95)}

/* BLOCKS */
.block-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm);transition:all 0.2s}
.block-card.completed{opacity:0.5}
.block-card.completed .block-header-bar{background:var(--accent-light)!important}
.block-card.is-current{border-color:var(--warm);box-shadow:0 0 0 2px rgba(212,163,115,0.15),var(--shadow)}
.block-header-bar{height:3px}
.block-header{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;cursor:pointer;user-select:none}
.block-left{flex:1}
.block-name{font-weight:600;font-size:0.85rem;display:flex;align-items:center;gap:8px}
.block-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.72rem;flex-shrink:0;color:white;font-weight:700}
.block-time{font-size:0.68rem;color:var(--text-secondary);margin-top:2px;margin-left:34px}
.block-check{width:24px;height:24px;border-radius:50%;border:2px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;background:white;font-size:0.65rem}
.block-check.checked{background:var(--accent);border-color:var(--accent);color:white}
.block-body{padding:2px 14px 12px 48px;display:none}
.block-card.expanded .block-body{display:block}
.block-task{font-size:0.78rem;color:var(--text-secondary);line-height:1.6;margin-bottom:2px;padding-left:12px;position:relative}
.block-task::before{content:'';position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,0.12)}

/* MCQ */
.mcq-section{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.mcq-section-title{font-family:var(--font-display);font-size:1.05rem;margin-bottom:14px}
.input-row{display:flex;gap:10px;margin-bottom:10px}
.input-group{flex:1;display:flex;flex-direction:column}
.input-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-secondary);margin-bottom:4px;font-weight:600}
.input-field{width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,0.07);border-radius:var(--radius-sm);font-size:0.85rem;font-family:var(--font-body);background:var(--bg);color:var(--text);outline:none;transition:all 0.2s}
.input-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(27,67,50,0.06)}
.btn{padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:var(--font-body);letter-spacing:0.2px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-mid));color:white;width:100%;box-shadow:0 2px 8px rgba(27,67,50,0.15)}
.btn-primary:active{transform:scale(0.97)}
.btn-outline{background:white;color:var(--accent);border:1.5px solid var(--accent);width:100%}
.btn-sm{padding:6px 12px;font-size:0.7rem;width:auto}

.mcq-entry{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(0,0,0,0.03);font-size:0.8rem}
.mcq-entry:last-child{border-bottom:none}
.mcq-score{font-weight:700;color:var(--accent);font-family:var(--font-display);font-size:0.88rem}
.mcq-score.low{color:var(--red)}
.mcq-pct-bar{height:3px;border-radius:2px;background:rgba(0,0,0,0.04);margin-top:4px;overflow:hidden}
.mcq-pct-fill{height:100%;border-radius:2px;transition:width 0.3s}

/* CALENDAR */
.cal-day{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
.cal-day.today-cal{border-left:4px solid var(--accent);box-shadow:var(--shadow)}
.cal-day.past .cal-day-header{opacity:0.4}
.cal-day-header{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;cursor:pointer}
.cal-day-num{font-family:var(--font-display);font-size:1rem}
.cal-day-date{font-size:0.66rem;color:var(--text-secondary)}
.cal-subject-badge{padding:3px 10px;border-radius:20px;font-size:0.7rem;font-weight:600}
.cal-day-detail{padding:0 14px 12px;display:none;font-size:0.76rem;color:var(--text-secondary);line-height:1.6}
.cal-day.expanded .cal-day-detail{display:block}
.cal-progress{display:flex;gap:4px;padding:0 14px 8px}
.cal-block-dot{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,0.06)}
.cal-block-dot.done-dot{background:var(--accent)}
.cal-actions{display:flex;gap:6px;padding:0 14px 12px;flex-wrap:wrap}

/* NOTES */
.wrong-entry{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;font-size:0.8rem;box-shadow:var(--shadow-sm)}
.wrong-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.wrong-text{line-height:1.5;color:var(--text)}
.wrong-subj{font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--warm-deep)}
.wrong-delete{color:var(--red);background:none;border:none;cursor:pointer;font-size:1rem;padding:0 4px;opacity:0.5}
.wrong-img{margin-top:8px;border-radius:8px;max-width:100%;border:1px solid var(--card-border);cursor:pointer}
.wrong-img-full{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;cursor:pointer}
.wrong-img-full img{max-width:100%;max-height:90vh;border-radius:8px}
textarea.input-field{min-height:56px;resize:vertical}
.img-upload-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px dashed rgba(0,0,0,0.1);border-radius:var(--radius-sm);background:white;color:var(--text-secondary);font-size:0.76rem;cursor:pointer;transition:all 0.2s;width:100%;justify-content:center;margin-bottom:10px}
.img-upload-btn:hover{border-color:var(--accent);color:var(--accent)}
.img-preview{max-width:100%;max-height:120px;border-radius:8px;margin-bottom:10px;border:1px solid var(--card-border)}

.empty-state{text-align:center;padding:36px 20px;color:var(--text-secondary);font-size:0.82rem}
.section-title{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:10px;font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px 20px 36px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:rgba(0,0,0,0.1);border-radius:4px;margin:0 auto 14px}
.modal-title{font-family:var(--font-display);font-size:1.15rem;margin-bottom:14px}
.modal-form-group{margin-bottom:12px}
.modal-form-group label{display:block;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-secondary);margin-bottom:4px;font-weight:600}
.task-edit-row{display:flex;gap:8px;margin-bottom:5px;align-items:center}
.task-edit-row input{flex:1}
.task-remove-btn{background:none;border:none;color:var(--red);font-size:1.1rem;cursor:pointer;padding:4px 6px;opacity:0.5}
.add-task-btn{background:none;border:1.5px dashed rgba(0,0,0,0.08);border-radius:var(--radius-sm);padding:8px;width:100%;color:var(--text-secondary);font-size:0.76rem;cursor:pointer;margin-top:4px}
.add-task-btn:hover{border-color:var(--accent);color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.modal-btns .btn{flex:1}
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s}
.color-dot.selected{border-color:var(--text);transform:scale(1.15)}

@media print{
  body{background:white}
  .nav-tabs,.btn,.block-check,.timer-wrap,.cal-actions,.modal-overlay,.notif-toggle,.current-block-banner,.timer-presets,.img-upload-btn{display:none}
  .tab-content{display:block!important}
  .block-body{display:block!important}
}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="app-title">NEET<span>PG</span></div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="header-subtitle" id="headerSubtitle"></div>
  <div class="header-row2">
    <button class="notif-toggle" id="notifToggle" onclick="toggleNotifications()">
      <span class="notif-dot" id="notifDot"></span>
      <span id="notifLabel">Reminders</span>
    </button>
    <span class="version-tag">v2.1</span>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-value" id="statDay">-</div><div class="stat-label">Day</div></div>
  <div class="stat-card"><div class="stat-value" id="statBlocks">0/4</div><div class="stat-label">Blocks</div></div>
  <div class="stat-card"><div class="stat-value" id="statMcq">0</div><div class="stat-label">MCQs</div></div>
  <div class="stat-card"><div class="stat-value" id="statStreak">0</div><div class="stat-label">Streak</div></div>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" data-tab="today">Today</button>
  <button class="nav-tab" data-tab="mcq">MCQ</button>
  <button class="nav-tab" data-tab="calendar">Calendar</button>
  <button class="nav-tab" data-tab="notes">Notes</button>
</div>

<div class="tab-content active" id="tab-today"></div>
<div class="tab-content" id="tab-mcq"></div>
<div class="tab-content" id="tab-calendar"></div>
<div class="tab-content" id="tab-notes"></div>

<div class="modal-overlay" id="modalOverlay"><div class="modal-sheet" id="modalSheet"></div></div>
<div id="imgFullView" style="display:none"></div>

<script>
const APP_VERSION='2.1';
const DEFAULT_SCHEDULE=[
  {day:1,date:'2026-06-01',subject:'Anatomy',color:'#1B4332',blocks:[{name:'Block A',time:'9:30 AM – 1:00 PM',label:'Morning Clinic — Core Revision',tasks:['Upper limb, lower limb clinical correlates','Brachial plexus injuries, nerve lesions, dermatomes','Embryology — germ layers, pharyngeal arches']},{name:'Block B',time:'2:00 – 5:45 PM',label:'Afternoon — MCQ + Active Recall',tasks:['2:00–3:15 → 50 Anatomy MCQs (timed)','3:30–4:45 → 50 mixed-subject MCQs','4:45–5:45 → Review wrong answers']},{name:'Block C',time:'6:00 – 9:30 PM',label:'Evening Clinic — Weak Areas',tasks:['Neuroanatomy — cranial nerves, blood supply','Brown-Sequard, UMN vs LMN','Cross-sectional anatomy images']},{name:'Block D',time:'10:30 PM – 12:00 AM',label:'Night — Consolidation',tasks:['Review wrong answers','Preview Physiology']}]},

const COLORS=['#1B4332','#5A4B8A','#8A6B3D','#6C567B','#BC4749','#D4A373','#3A6EA5','#6B6358','#4A7B6F','#8B5E3C'];
const BLOCK_ICONS=['A','B','C','D'];
const BLOCK_COLORS=['#1B4332','#D4A373','#6C567B','#3A6EA5'];
const TIMER_PRESETS=[30,45,60,75,90];

function getState(){try{return JSON.parse(localStorage.getItem('neetpg_v4')||'{}')}catch{return {}}}
function saveState(s){localStorage.setItem('neetpg_v4',JSON.stringify(s))}
function getSchedule(){const s=getState();return(s.schedule&&s.schedule.length>0)?s.schedule:JSON.parse(JSON.stringify(DEFAULT_SCHEDULE))}
function saveSchedule(sched){const s=getState();sched.forEach((item,i)=>{item.day=i+1});s.schedule=sched;saveState(s)}
function getToday(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`}
function formatDate(ds){return new Date(ds+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'})}
function getDayStatus(d){const s=getState();const b=s[`blocks_${d}`]||{};return Object.values(b).filter(v=>v).length}
function getStreak(){const sched=getSchedule();let streak=0;const today=new Date();for(let i=0;i<30;i++){const d=new Date(today);d.setDate(d.getDate()-i);const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const sc=sched.find(s=>s.date===ds);if(!sc){if(i===0)continue;else break}if(getDayStatus(ds)>=3)streak++;else if(i>0)break}return streak}
function getTotalMcqs(){return(getState().mcqLogs||[]).reduce((sum,l)=>sum+(l.total||0),0)}
function parseBlockTime(ts){const m=ts.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);if(!m)return null;let h=parseInt(m[1]),mi=parseInt(m[2]);if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;if(m[3].toUpperCase()==='AM'&&h===12)h=0;return{h,m:mi}}
function getCurrentBlock(){const sched=getSchedule();const sc=sched.find(s=>s.date===getToday());if(!sc)return null;const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();for(let i=0;i<sc.blocks.length;i++){const parts=sc.blocks[i].time.split('–').map(s=>s.trim());const s=parseBlockTime(parts[0]),e=parseBlockTime(parts[1]);if(s&&e&&nowMin>=s.h*60+s.m&&nowMin<e.h*60+e.m)return{index:i,block:sc.blocks[i],subject:sc.subject}}return null}

// PERSISTENT TIMER — stores startTime so it survives page close
function getTimerState(){const s=getState();return s.timer||{}}
function saveTimerState(t){const s=getState();s.timer=t;saveState(s)}

let timerInterval=null;
let timerEndTimeout=null;
let selectedDuration=75;

function getTimerRemaining(){
  const t=getTimerState();
  if(!t.startTime)return t.duration?t.duration*60:(selectedDuration*60);
  if(t.paused)return t.remaining||0;
  const elapsed=Math.floor((Date.now()-t.startTime)/1000);
  const remaining=(t.duration*60)-elapsed;
  return Math.max(0,remaining);
}

function renderTimer(){
  const remaining=getTimerRemaining();
  const t=getTimerState();
  const total=(t.duration||selectedDuration)*60;
  const min=Math.floor(remaining/60),sec=remaining%60;
  const el=document.getElementById('timerDisplay');
  if(el)el.textContent=`${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  const sub=document.getElementById('timerSub');
  if(sub)sub.textContent=t.startTime&&!t.paused?'Running':t.paused?'Paused':'Ready';
  const circle=document.getElementById('timerCircle');
  if(circle){const circ=2*Math.PI*74;circle.style.strokeDasharray=circ;circle.style.strokeDashoffset=circ*(1-(remaining/total));circle.classList.toggle('urgent',remaining<300&&remaining>0)}
  document.querySelectorAll('.timer-preset').forEach(p=>{p.classList.toggle('active',parseInt(p.dataset.min)===(t.duration||selectedDuration))});
}

function onTimerEnd(){
  clearInterval(timerInterval);clearTimeout(timerEndTimeout);
  const t=getTimerState();
  const dur=t.duration||selectedDuration;
  saveTimerState({});
  sendNotif('MCQ Timer Done!',`${dur} min complete. Review your answers now.`);
  renderTimer();
  alert('Time up! '+dur+' minutes complete.');
}

function scheduleTimerEnd(){
  clearTimeout(timerEndTimeout);
  const rem=getTimerRemaining();
  if(rem>0){timerEndTimeout=setTimeout(onTimerEnd,rem*1000)}
}

function startTimer(){
  const t=getTimerState();
  if(t.startTime&&!t.paused)return;
  if(t.paused&&t.remaining>0){
    const newStart=Date.now()-(((t.duration||selectedDuration)*60-t.remaining)*1000);
    saveTimerState({startTime:newStart,duration:t.duration||selectedDuration,paused:false});
  }else{
    saveTimerState({startTime:Date.now(),duration:selectedDuration,paused:false});
  }
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{const rem=getTimerRemaining();renderTimer();if(rem<=0){onTimerEnd()}},1000);
  scheduleTimerEnd();
  renderTimer();
}

function pauseTimer(){
  const remaining=getTimerRemaining();
  const t=getTimerState();
  clearInterval(timerInterval);clearTimeout(timerEndTimeout);
  saveTimerState({duration:t.duration||selectedDuration,paused:true,remaining});
  renderTimer();
}

function resetTimer(){
  clearInterval(timerInterval);clearTimeout(timerEndTimeout);
  saveTimerState({});
  renderTimer();
}

function setTimerDuration(min){
  const t=getTimerState();
  if(t.startTime&&!t.paused)return;
  selectedDuration=min;
  saveTimerState({duration:min});
  renderTimer();
}

function resumeTimerIfRunning(){
  const t=getTimerState();
  if(t.startTime&&!t.paused){
    const rem=getTimerRemaining();
    if(rem>0){
      clearInterval(timerInterval);
      timerInterval=setInterval(()=>{const r=getTimerRemaining();renderTimer();if(r<=0){onTimerEnd()}},1000);
      scheduleTimerEnd();
    }else{onTimerEnd()}
  }
  if(t.duration)selectedDuration=t.duration;
}

// NOTIFICATIONS — persisted
function isNotifEnabled(){return getState().notifEnabled===true}
function setNotifEnabled(v){const s=getState();s.notifEnabled=v;saveState(s)}

function updateNotifUI(){
  const on=isNotifEnabled();
  const dot=document.getElementById('notifDot');
  const label=document.getElementById('notifLabel');
  if(dot)dot.classList.toggle('on',on);
  if(label)label.textContent=on?'On':'Reminders';
}

function toggleNotifications(){
  if(!isNotifEnabled()){
    if(!('Notification' in window)){alert('Browser does not support notifications');return}
    Notification.requestPermission().then(p=>{if(p==='granted'){setNotifEnabled(true);updateNotifUI()}else{alert('Allow notifications in browser settings')}});
  }else{setNotifEnabled(false);updateNotifUI()}
}

function sendNotif(title,body){
  if(!isNotifEnabled()||!('Notification' in window)||Notification.permission!=='granted')return;
  try{new Notification(title,{body,badge:'.',tag:title.slice(0,20),renotify:true})}catch(e){}
}

let notifiedBlocks={};
function checkNotifications(){
  if(!isNotifEnabled())return;
  const sched=getSchedule();const sc=sched.find(s=>s.date===getToday());if(!sc)return;
  const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();const dk=getToday();
  sc.blocks.forEach((block,i)=>{
    const s=parseBlockTime(block.time.split('–')[0].trim());if(!s)return;
    const sm=s.h*60+s.m;
    const k1=`${dk}_${i}`,k2=`${dk}_pre_${i}`;
    if(nowMin>=sm&&nowMin<=sm+1&&!notifiedBlocks[k1]){notifiedBlocks[k1]=true;sendNotif(`${block.name} — ${sc.subject}`,`${block.label}\n${block.time}`)}
    if(nowMin>=sm-5&&nowMin<=sm-4&&!notifiedBlocks[k2]){notifiedBlocks[k2]=true;sendNotif(`${block.name} in 5 min`,block.label)}
  });
  [{h:6,m:30,k:'gym',t:'Good Morning!',b:'Gym time!'},{h:8,m:30,k:'bath',t:'Gym Done',b:'Get ready for clinic.'},{h:13,m:0,k:'lunch',t:'Lunch Time',b:'Block B at 2 PM.'},{h:15,m:15,k:'break',t:'Break',b:'Mixed MCQs next.'},{h:21,m:30,k:'dinner',t:'Dinner + Dog Walk',b:'Relax time.'},{h:23,m:45,k:'sleep',t:'Sleep in 15 min',b:'Wrap up. Sleep at 12!'}].forEach(r=>{
    const rm=r.h*60+r.m,rk=`${dk}_r_${r.k}`;
    if(nowMin>=rm&&nowMin<=rm+1&&!notifiedBlocks[rk]){notifiedBlocks[rk]=true;sendNotif(r.t,r.b)}
  });
}
setInterval(checkNotifications,30000);

// Restore notification check on visibility change
document.addEventListener('visibilitychange',()=>{if(!document.hidden){resumeTimerIfRunning();renderTimer();checkNotifications();updateStats()}});

// TODAY
function renderToday(){
  const sched=getSchedule();const td=getToday();const sc=sched.find(s=>s.date===td)||sched[0];
  const st=getState();const bk=st[`blocks_${sc.date}`]||{};const curBlock=getCurrentBlock();

  let h=`<div class="today-hero"><div class="today-label">Today's Focus</div><div class="today-subject-name">${sc.subject}</div><div class="today-day-badge">Day ${sc.day} of ${sched.length} · ${formatDate(sc.date)}</div></div>`;

  h+=`<div class="timer-wrap">
    <div class="timer-presets">${TIMER_PRESETS.map(m=>`<button class="timer-preset ${m===selectedDuration?'active':''}" data-min="${m}" onclick="setTimerDuration(${m})">${m}m</button>`).join('')}</div>
    <div class="timer-ring"><svg width="170" height="170" viewBox="0 0 170 170"><circle class="ring-bg" cx="85" cy="85" r="74"/><circle class="ring-fg" id="timerCircle" cx="85" cy="85" r="74" stroke-dasharray="${circ}" stroke-dashoffset="0"/></svg><div class="timer-center"><div class="timer-display" id="timerDisplay">--:--</div><div class="timer-sub" id="timerSub">Ready</div></div></div>
    <div class="timer-btns"><button class="btn-timer active-timer" onclick="startTimer()">Start</button><button class="btn-timer" onclick="pauseTimer()">Pause</button><button class="btn-timer" onclick="resetTimer()">Reset</button></div>
  </div>`;

  sc.blocks.forEach((block,i)=>{
    const checked=bk[i]||false;const isCur=curBlock&&curBlock.index===i;
    h+=`<div class="block-card ${checked?'completed':''} ${isCur?'is-current':''}" id="block-${i}"><div class="block-header-bar" style="background:${BLOCK_COLORS[i]}"></div><div class="block-header" onclick="toggleBlock(${i})"><div class="block-left"><div class="block-name"><div class="block-icon" style="background:${BLOCK_COLORS[i]}">${BLOCK_ICONS[i]}</div>${block.label}</div><div class="block-time">${block.time}</div></div><div class="block-check ${checked?'checked':''}" onclick="event.stopPropagation();checkBlock(${i})">${checked?'✓':''}</div></div><div class="block-body">${block.tasks.map(t=>`<div class="block-task">${t}</div>`).join('')}</div></div>`;
  });
  document.getElementById('tab-today').innerHTML=h;
  resumeTimerIfRunning();renderTimer();
}
function toggleBlock(i){document.getElementById(`block-${i}`).classList.toggle('expanded')}
function checkBlock(i){const sched=getSchedule();const sc=sched.find(s=>s.date===getToday())||sched[0];const st=getState();const k=`blocks_${sc.date}`;if(!st[k])st[k]={};st[k][i]=!st[k][i];saveState(st);renderToday();updateStats()}

// MCQ
function renderMcq(){
  const logs=getState().mcqLogs||[];const sc=getSchedule().find(s=>s.date===getToday());const subj=sc?sc.subject:'General';
  let h=`<div class="mcq-section"><div class="mcq-section-title">Log MCQ Score</div>
    <div class="input-row"><div class="input-group"><div class="input-label">Type</div><select class="input-field" id="mcqType"><option value="subject">${subj} (Subject)</option><option value="mixed">Mixed (All 19)</option></select></div></div>
    <div class="input-row"><div class="input-group"><div class="input-label">Correct</div><input type="number" class="input-field" id="mcqCorrect" placeholder="0" min="0"></div><div class="input-group"><div class="input-label">Total</div><input type="number" class="input-field" id="mcqTotal" placeholder="50" value="50" min="1"></div></div>
    <button class="btn btn-primary" onclick="saveMcq()">Save Score</button></div>`;
  if(logs.length>0){h+=`<div class="section-title">Recent Scores</div>`;logs.slice(-20).reverse().forEach(l=>{const pct=Math.round((l.correct/l.total)*100);h+=`<div class="mcq-entry"><div><div style="font-weight:600">${l.type==='subject'?l.subject:'Mixed (All 19)'}</div><div style="font-size:0.66rem;color:var(--text-secondary)">${l.date}</div><div class="mcq-pct-bar"><div class="mcq-pct-fill" style="width:${pct}%;background:${pct<50?'var(--red)':'var(--accent)'}"></div></div></div><div class="mcq-score ${pct<50?'low':''}">${l.correct}/${l.total}<br><span style="font-size:0.68rem">${pct}%</span></div></div>`})}
  document.getElementById('tab-mcq').innerHTML=h;
}
function saveMcq(){const c=parseInt(document.getElementById('mcqCorrect').value)||0;const t=parseInt(document.getElementById('mcqTotal').value)||50;const type=document.getElementById('mcqType').value;const sc=getSchedule().find(s=>s.date===getToday());const st=getState();if(!st.mcqLogs)st.mcqLogs=[];st.mcqLogs.push({correct:c,total:t,type,subject:sc?sc.subject:'General',date:new Date().toLocaleDateString('en-IN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})});saveState(st);renderMcq();updateStats();document.getElementById('mcqCorrect').value=''}

// CALENDAR
function renderCalendar(){
  const sched=getSchedule();const td=getToday();
  let h=`<div style="margin-bottom:12px"><button class="btn btn-outline" onclick="openAddDayModal()">+ Add New Day</button></div>`;
  sched.forEach((sc,idx)=>{const isToday=sc.date===td;const isPast=sc.date<td;const done=getDayStatus(sc.date);const st=getState();
    h+=`<div class="cal-day ${isToday?'today-cal':''} ${isPast?'past':''}" id="cal-${idx}"><div class="cal-day-header" onclick="document.getElementById('cal-${idx}').classList.toggle('expanded')"><div><div class="cal-day-num">Day ${sc.day} — ${sc.subject}</div><div class="cal-day-date">${formatDate(sc.date)}</div></div><div class="cal-subject-badge" style="background:${sc.color}15;color:${sc.color}">${done}/4</div></div><div class="cal-progress">${sc.blocks.map((_,i)=>{const bk=st[`blocks_${sc.date}`]||{};return`<div class="cal-block-dot ${bk[i]?'done-dot':''}"></div>`}).join('')}</div><div class="cal-day-detail">${sc.blocks.map(b=>`<div><strong>${b.name}:</strong> ${b.label}<br>${b.tasks.join('. ')}.</div><br>`).join('')}<div class="cal-actions"><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openEditDayModal(${idx})">Edit</button><button class="btn btn-sm" style="background:var(--warm-light);color:var(--warm-deep);border:1px solid var(--warm)" onclick="event.stopPropagation();duplicateDay(${idx})">Duplicate</button>${sched.length>1?`<button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:1px solid var(--red)" onclick="event.stopPropagation();deleteDay(${idx})">Delete</button>`:''}${idx>0?`<button class="btn btn-sm" style="background:var(--accent-light);color:var(--accent);border:1px solid var(--accent)" onclick="event.stopPropagation();moveDay(${idx},-1)">Up</button>`:''}</div></div></div>`});
  h+=`<div style="margin-top:14px"><button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:1px solid var(--red);width:100%" onclick="resetSchedule()">Reset to Default</button></div>`;
  document.getElementById('tab-calendar').innerHTML=h;
}
function openEditDayModal(idx){const sched=getSchedule();const sc=sched[idx];let th='';sc.blocks.forEach((b,bi)=>{th+=`<div style="margin-top:12px;font-weight:600;font-size:0.8rem">${b.name}</div><div class="modal-form-group"><label>Label</label><input class="input-field" id="ebl-${bi}" value="${b.label}"></div><div class="modal-form-group"><label>Time</label><input class="input-field" id="ebt-${bi}" value="${b.time}"></div><div id="et-${bi}">${b.tasks.map((t,ti)=>`<div class="task-edit-row"><input class="input-field" value="${t}" id="etk-${bi}-${ti}"><button class="task-remove-btn" onclick="this.parentElement.remove()">×</button></div>`).join('')}</div><button class="add-task-btn" onclick="addTF(${bi})">+ Add task</button>`});
  const cd=COLORS.map(c=>`<div class="color-dot ${c===sc.color?'selected':''}" style="background:${c}" onclick="document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));this.classList.add('selected');this.dataset.color='${c}'" data-color="${c}"></div>`).join('');
  openModal(`<div class="modal-title">Edit Day ${sc.day}</div><div class="modal-form-group"><label>Subject</label><input class="input-field" id="eSubj" value="${sc.subject}"></div><div class="modal-form-group"><label>Date</label><input type="date" class="input-field" id="eDate" value="${sc.date}"></div><div class="modal-form-group"><label>Color</label><div class="color-picker">${cd}</div></div>${th}<div class="modal-btns"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveED(${idx})">Save</button></div>`)}
function addTF(bi){const c=document.getElementById(`et-${bi}`);const d=document.createElement('div');d.className='task-edit-row';d.innerHTML=`<input class="input-field" placeholder="New task"><button class="task-remove-btn" onclick="this.parentElement.remove()">×</button>`;c.appendChild(d)}
function saveED(idx){const sched=getSchedule();const sc=sched[idx];sc.subject=document.getElementById('eSubj').value.trim()||sc.subject;sc.date=document.getElementById('eDate').value||sc.date;const sel=document.querySelector('.color-dot.selected');if(sel)sc.color=sel.dataset.color;sc.blocks.forEach((b,bi)=>{const l=document.getElementById(`ebl-${bi}`),t=document.getElementById(`ebt-${bi}`);if(l)b.label=l.value.trim()||b.label;if(t)b.time=t.value.trim()||b.time;const tc=document.getElementById(`et-${bi}`);if(tc)b.tasks=Array.from(tc.querySelectorAll('input')).map(i=>i.value.trim()).filter(v=>v)});saveSchedule(sched);closeModal();renderCalendar();updateHeader();updateStats()}
function openAddDayModal(){const sched=getSchedule();const last=sched.length>0?sched[sched.length-1].date:getToday();const nd=new Date(last+'T00:00:00');nd.setDate(nd.getDate()+1);const nds=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}-${String(nd.getDate()).padStart(2,'0')}`;const cd=COLORS.map((c,i)=>`<div class="color-dot ${i===0?'selected':''}" style="background:${c}" onclick="document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));this.classList.add('selected');this.dataset.color='${c}'" data-color="${c}"></div>`).join('');openModal(`<div class="modal-title">Add New Day</div><div class="modal-form-group"><label>Subject</label><input class="input-field" id="newSubject" placeholder="e.g. OBG Part 2"></div><div class="modal-form-group"><label>Date</label><input type="date" class="input-field" id="newDate" value="${nds}"></div><div class="modal-form-group"><label>Color</label><div class="color-picker">${cd}</div></div><p style="font-size:0.76rem;color:var(--text-secondary);margin:10px 0">Default 4 blocks created. Edit after adding.</p><div class="modal-btns"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewDay()">Add</button></div>`)}
function saveNewDay(){const subj=document.getElementById('newSubject').value.trim();if(!subj){alert('Subject name required');return}const date=document.getElementById('newDate').value;const sel=document.querySelector('.color-dot.selected');const col=sel?sel.dataset.color:COLORS[0];const sched=getSchedule();sched.push({day:sched.length+1,date,subject:subj,color:col,blocks:[{name:'Block A',time:'9:30 AM – 1:00 PM',label:'Morning Clinic — Core Revision',tasks:['Add topics']},{name:'Block B',time:'2:00 – 5:45 PM',label:'Afternoon — MCQ + Active Recall',tasks:[`50 ${subj} MCQs`,'50 mixed MCQs','Wrong answer review']},{name:'Block C',time:'6:00 – 9:30 PM',label:'Evening Clinic — Weak Areas',tasks:['Add weak topics']},{name:'Block D',time:'10:30 PM – 12:00 AM',label:'Night — Consolidation',tasks:['Review wrong answers','Preview next subject']}]});saveSchedule(sched);closeModal();renderCalendar();updateHeader();updateStats()}
function duplicateDay(idx){const sched=getSchedule();const c=JSON.parse(JSON.stringify(sched[idx]));const d=new Date(c.date+'T00:00:00');d.setDate(d.getDate()+1);c.date=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;c.subject+=' (contd.)';sched.splice(idx+1,0,c);saveSchedule(sched);renderCalendar();updateHeader();updateStats()}
function deleteDay(idx){if(!confirm('Delete this day?'))return;const sched=getSchedule();sched.splice(idx,1);saveSchedule(sched);renderCalendar();updateHeader();updateStats()}
function moveDay(idx,dir){const sched=getSchedule();const ni=idx+dir;if(ni<0||ni>=sched.length)return;[sched[idx],sched[ni]]=[sched[ni],sched[idx]];saveSchedule(sched);renderCalendar()}
function resetSchedule(){if(!confirm('Reset to default?'))return;const st=getState();st.schedule=JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));saveState(st);renderCalendar();updateHeader();updateStats()}

// NOTES with image support
let pendingImage=null;
function renderNotes(){
  const st=getState();const notes=st.wrongNotes||[];const sc=getSchedule().find(s=>s.date===getToday());const subj=sc?sc.subject:'General';
  let h=`<div class="mcq-section"><div class="mcq-section-title">Wrong Answer Log</div>
    <div class="input-row"><div class="input-group"><div class="input-label">Subject</div><input type="text" class="input-field" id="noteSubject" value="${subj}"></div></div>
    <div class="input-group" style="margin-bottom:10px"><div class="input-label">One-liner correction</div><textarea class="input-field" id="noteText" placeholder="e.g. Gaucher = Glucocerebrosidase, not Sphingomyelinase"></textarea></div>
    <label class="img-upload-btn" for="noteImg">📷 Add Screenshot<input type="file" id="noteImg" accept="image/*" capture="environment" style="display:none" onchange="previewNoteImg(this)"></label>
    <div id="noteImgPreview"></div>
    <button class="btn btn-primary" onclick="saveNote()">Add Note</button></div>`;
  if(notes.length>0){
    h+=`<div class="section-title">${notes.length} Notes</div>`;
    notes.slice().reverse().forEach((n,i)=>{const ri=notes.length-1-i;
      h+=`<div class="wrong-entry"><div><div class="wrong-entry-header"><div class="wrong-subj">${n.subject}</div><button class="wrong-delete" onclick="deleteNote(${ri})">×</button></div><div class="wrong-text">${n.text}</div>${n.image?`<img class="wrong-img" src="${n.image}" onclick="showFullImg(this.src)" alt="screenshot">`:''}</div></div>`});
  }else{h+=`<div class="empty-state">No notes yet. Add corrections after MCQ sessions.</div>`}
  document.getElementById('tab-notes').innerHTML=h;
  pendingImage=null;
}

function previewNoteImg(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    // Compress image for localStorage
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const maxW=600;const scale=Math.min(1,maxW/img.width);
      canvas.width=img.width*scale;canvas.height=img.height*scale;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      pendingImage=canvas.toDataURL('image/jpeg',0.6);
      document.getElementById('noteImgPreview').innerHTML=`<img class="img-preview" src="${pendingImage}"><button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:1px solid var(--red);margin-bottom:10px" onclick="pendingImage=null;document.getElementById('noteImgPreview').innerHTML=''">Remove</button>`;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function showFullImg(src){
  const el=document.getElementById('imgFullView');
  el.className='wrong-img-full';el.style.display='flex';
  el.innerHTML=`<img src="${src}">`;
  el.onclick=()=>{el.style.display='none'};
}

function saveNote(){const subj=document.getElementById('noteSubject').value.trim();const text=document.getElementById('noteText').value.trim();if(!text&&!pendingImage)return;const st=getState();if(!st.wrongNotes)st.wrongNotes=[];st.wrongNotes.push({subject:subj,text:text||'(screenshot)',image:pendingImage||null,date:getToday()});saveState(st);renderNotes()}
function deleteNote(i){const st=getState();if(st.wrongNotes){st.wrongNotes.splice(i,1);saveState(st);renderNotes()}}

// NAV
document.querySelectorAll('.nav-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));tab.classList.add('active');document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');const tn=tab.dataset.tab;if(tn==='today')renderToday();else if(tn==='mcq')renderMcq();else if(tn==='calendar')renderCalendar();else if(tn==='notes')renderNotes()})});

setInterval(()=>{const a=document.querySelector('.nav-tab.active');if(a&&a.dataset.tab==='today')renderToday()},60000);

updateHeader();updateStats();renderToday();updateNotifUI();checkNotifications();
